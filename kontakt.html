<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kontakt - GroveX</title>
  <link rel="icon" type="image/png" href="assets/grovex-logo-firkant.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="logo">
      <a href="index.html">
        <img src="assets/grovex-logo.png" alt="GroveX logo" style="height: 38px;">
      </a>
    </div>
    <button class="menu-toggle" id="menuToggle" aria-label="Menu">
      <span></span><span></span><span></span><span></span>
    </button>
    <nav class="nav-drawer" id="navDrawer">
      <a href="index.html">Forside</a>
      <a href="om-os.html">Om os</a>
      <a href="kontakt.html">Kontakt</a>
      <a href="#login">Login</a>
    </nav>
    <div class="drawer-overlay" id="drawerOverlay"></div>
  </header>
  
  <!-- Hero Section -->
  <section class="kontakt-hero-section">
    <div class="kontakt-hero-image">
      <img src="assets/Hero image om os - Mand der sidder ved computer.png" alt="Hero image">
    </div>
  </section>

  <section class="stats-section">
    <div class="stats-content">
      <div class="stat-item stat-item-left">
        <div class="stat-text">
          <p class="typewriter-cursor typewriter-animation">Af restauranter har <span style="color:#497cff;">hjemmesider</span>, men kun...</p>
        </div>
        <div style="display:flex;align-items:center;justify-content:center;">
          <img src="assets/Logo på telefon - Kontakt side.png" alt="Telefon illustration" style="max-width: 200px; height: auto;">
        </div>
      </div>
    </div>
  </section>
  <section class="stats-section">
    <div class="stats-content">
      <div class="stat-item stat-item-right">
        <div style="display:flex;align-items:center;justify-content:center;">
          <img src="assets/Gmail logo - Kontakt side.png" alt="Gmail logo" style="max-width: 200px; height: auto;">
        </div>
        <div class="stat-text">
          <p class="typewriter-cursor typewriter-animation">af dem har <span style="color:#497cff;">systemer</span> til at hjælpe dem</p>
        </div>
      </div>
    </div>
  </section>

  <!-- Kontakt Heading Section -->
  <section class="contact-section">
    <h4>Har du lyst til at høre om hvad vi kan gøre for dig?</h4>
    <div class="contact-card">
      <div class="contact-info">
        <div class="info-box">
          <span class="info-icon"><img src="assets/pngwing-com-1-20.png" alt="Email icon" style="width: 25px; height: 25px;"></span>
          <span><a href="tel:#31#60571908">+45 60 57 19 08</a></span>
        </div>
        <div class="info-box">
          <span class="info-icon"><img src="assets/node-22.png" alt="Email icon" style="width: 25px; height: 25px;"></span>
          <span><a href="mailto:grovex.dk@gmail.com">grovex.dk@gmail.com</a> <br></span>
        </div>
      </div>
      <div class="contact-divider">eller</div>
      <form class="contact-form" id="contactForm">
        <input type="text" id="name" name="name" placeholder="Navn" required>
        <input type="email" id="email" name="email" placeholder="Email" required>
        <button type="submit">Udfyld så kontakter vi dig!</button>
        <div id="formStatus"></div>
      </form>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-links">
      <a href="om-os.html">Om os</a>
      <a href="kontakt.html">Kontakt</a>
      <a href="#login">Login</a>
    </div>
    <div class="footer-contact">
      <a class="footer-email" href="mailto:grovex.dk@gmail.com">grovex.dk@gmail.com</a>
      <a class="footer-phone" href="tel:+4560571908">+45 60 57 19 08</a>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
